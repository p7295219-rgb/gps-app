<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8" />
<title>Mapa</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
  html, body {
    height: 100%;
    margin: 0;
  }

  #map {
    height: 100%;
  }
</style>

</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>

// 🔥 FIREBASE
var firebaseConfig = {
  apiKey: "AIzaSyC1Pq3NXrmgT-O47XOFp6x2yy42yuFQvDI",
  authDomain: "palmira-limpia.firebaseapp.com",
  databaseURL: "https://palmira-limpia-default-rtdb.firebaseio.com/",
  projectId: "palmira-limpia",
  storageBucket: "palmira-limpia.firebasestorage.app",
  messagingSenderId: "180840682422",
  appId: "1:180840682422:web:1e22170efc313b39286717"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

// 🗺️ MAPA
var map = L.map('map').setView([-33.874, -58.416], 14);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }
).addTo(map);

// 📍 MARCADOR
var marker = L.marker([-33.874, -58.416]).addTo(map);

// 🟢 RECORRIDO
var path = [];

var polyline = L.polyline(path, {
  color: 'lime',
  weight: 6,
  opacity: 0.9
}).addTo(map);

// 🔄 ESCUCHAR FIREBASE
db.ref("vehiculo1").on("child_added", function(snapshot) {

  var punto = snapshot.val();

  if (!punto) return;

  if (!punto.lat || !punto.lng) return;

  var latlng = [
    punto.lat,
    punto.lng
  ];

  // agregar punto al recorrido
  path.push(latlng);

  // actualizar línea
  polyline.setLatLngs(path);

  // mover marcador
  marker.setLatLng(latlng);

  // centrar mapa
  map.setView(latlng, 17);

});

</script>

</body>
</html>
