<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8" />
<title>Mapa</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
  html, body {
    height: 100%;
    margin: 0;
  }

  #map {
    height: 100%;
  }
</style>

</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>

// 🔥 FIREBASE
var firebaseConfig = {
  apiKey: "AIzaSyC1Pq3NXrmgT-O47XOFp6x2yy42yuFQvDI",
  authDomain: "palmira-limpia.firebaseapp.com",
  databaseURL: "https://palmira-limpia-default-rtdb.firebaseio.com/",
  projectId: "palmira-limpia",
  storageBucket: "palmira-limpia.firebasestorage.app",
  messagingSenderId: "180840682422",
  appId: "1:180840682422:web:1e22170efc313b39286717"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

// 🗺️ MAPA
var map = L.map('map').setView([-33.874, -58.416], 14);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }
).addTo(map);

// 📍 MARCADOR
var marker = L.marker([-33.874, -58.416]).addTo(map);

// 🟢 RECORRIDO
var path = [];

var polyline = L.polyline(path, {
  color: 'lime',
  weight: 6,
  opacity: 0.9
}).addTo(map);
// 🔵 RECORRIDO FIJO
const recorridoFijo = [

[-33.87891146518226, -58.407904422329224],
[-33.86910673662108, -58.39591359040061],
[-33.86918216190907, -58.395504812038936],
[-33.88524622918889, -58.39954717583301],
[-33.88509540694078, -58.400546411827506],
[-33.87891146518226, -58.4078590025111],

[-33.86736251817994, -58.41373032233993],
[-33.88033495262914, -58.39833300406811],

[-33.87890204802465, -58.40791658564743],
[-33.876262423923436, -58.41109597290135],
[-33.876941192204285, -58.411822689987815],
[-33.876337842592186, -58.41268566566998],
[-33.87562135973849, -58.411822689129835],
[-33.871699452283416, -58.41654635019299],
[-33.87102064231419, -58.41563795383469],
[-33.87060581189169, -58.41609214633387],
[-33.86966300673028, -58.4148203914327],
[-33.86924816916065, -58.415092910340036],
[-33.86830534900335, -58.41418451398181],
[-33.867400231857104, -58.41373031580265]

];

L.polyline(recorridoFijo, {
  color: 'blue',
  weight: 4,
  opacity: 0.7
}).addTo(map);
// 🔄 ESCUCHAR FIREBASE
db.ref("vehiculo1").on("child_added", function(snapshot) {

  var punto = snapshot.val();

  if (!punto) return;

  if (!punto.lat || !punto.lng) return;

  var latlng = [
    punto.lat,
    punto.lng
  ];

  // agregar punto al recorrido
  path.push(latlng);

  // actualizar línea
  polyline.setLatLngs(path);

  // mover marcador
  marker.setLatLng(latlng);

  // centrar mapa
  map.setView(latlng, 17);

});

</script>

</body>
</html>
