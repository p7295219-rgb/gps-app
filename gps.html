<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Enviar ubicación</title>
</head>
<body>

<h2 id="estado">Iniciando...</h2>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC1Pq3NXrmgT-O47XOFp6x2yy42yuFQvDI",
  authDomain: "palmira-limpia.firebaseapp.com",
  databaseURL: "https://palmira-limpia-default-rtdb.firebaseio.com/",
  projectId: "palmira-limpia",
  storageBucket: "palmira-limpia.firebasestorage.app",
  messagingSenderId: "180840682422",
  appId: "1:180840682422:web:1e22170efc313b39286717"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// función que obtiene y envía ubicación
function obtenerYEnviar() {

  navigator.geolocation.getCurrentPosition(
    function(pos) {

      var lat = pos.coords.latitude;
      var lng = pos.coords.longitude;

      db.ref("vehiculo1").push({
        lat: lat,
        lng: lng,
        time: Date.now()
      });

      document.getElementById("estado").innerText =
        "ENVIADO: " + lat + " | " + lng;

      console.log("ENVIADO:", lat, lng);

    },
    function(error) {

      console.log("ERROR GPS:", error);

      document.getElementById("estado").innerText =
        "ERROR GPS: " + error.message;

    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 5000
    }
  );

}

// ejecutar cada 5 segundos
setInterval(obtenerYEnviar, 5000);

// ejecutar una vez al inicio
obtenerYEnviar();

</script>

</body>
</html>
