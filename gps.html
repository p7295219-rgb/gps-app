

<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>Enviar ubicación</title>
</head>
<body>

<h2 id="estado">Enviando ubicación...</h2>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC1Pq3NXrmgT-O47XOFp6x2yy42yuFQvDI",
  authDomain: "palmira-limpia.firebaseapp.com",
  databaseURL: "https://palmira-limpia-default-rtdb.firebaseio.com/",
  projectId: "palmira-limpia",
  storageBucket: "palmira-limpia.firebasestorage.app",
  messagingSenderId: "180840682422",
  appId: "1:180840682422:web:1e22170efc313b39286717"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
console.log("DB URL:", firebaseConfig.databaseURL);

document.getElementById("estado").innerText =
  "DB: " + firebaseConfig.databaseURL;
function enviarUbicacion(pos) {

  var lat = pos.coords.latitude;
  var lng = pos.coords.longitude;

  fetch("https://palmira-limpia-default-rtdb.firebaseio.com/vehiculo1.json", {
    method: "POST",
    body: JSON.stringify({
      lat: lat,
      lng: lng,
      time: Date.now()
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("estado").innerText =
      "FETCH OK: " + lat + " | " + lng;
    console.log("OK:", data);
  })
  .catch(err => {
    document.getElementById("estado").innerText =
      "ERROR FETCH: " + err;
    console.log("ERROR:", err);
  });

}

}
navigator.geolocation.watchPosition(pos => {

  enviarUbicacion(pos);

}, error => {
  console.log("Error GPS:", error);
}, {
  enableHighAccuracy: true,
  maximumAge: 0,
  timeout: 5000
});
</script>

</body>
</html>
